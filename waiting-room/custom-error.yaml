apiVersion: v1
kind: ConfigMap
metadata:
  name: error-page-config
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>접속 대기중</title>
        <meta http-equiv="refresh" content="2"> </head>
    <body style="text-align: center; padding: 100px; font-family: sans-serif; background-color: #f4f4f9;">
        <h1 style="color: #ff4757;">🚦 현재 접속자가 많아 대기 중입니다 🚦</h1>
        <h2>잠시만 기다려주시면 자동으로 접속됩니다.</h2>
        <p style="color: #747d8c;">(2초마다 자동 새로고침 됩니다...)</p>
    </body>
    </html>
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-page-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-page
  template:
    metadata:
      labels:
        app: error-page
    spec:
      containers:
      - name: error-page
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: config-volume
        configMap:
          name: error-page-config
---
apiVersion: v1
kind: Service
metadata:
  name: error-page-service
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: error-page
